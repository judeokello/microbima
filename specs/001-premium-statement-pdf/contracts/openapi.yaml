openapi: 3.0.3
info:
  title: Premium Statement PDF — Internal API additions
  version: 0.1.0
  description: |
    Contracts for `001-premium-statement-pdf`. Base URL is the API origin + `/api` prefix as deployed.
    Existing auth applies (Bearer / internal session per app).

paths:
  /internal/customers/{customerId}/policies/{policyId}/premium-statement:
    get:
      operationId: getCustomerPremiumStatementPdf
      summary: Download premium statement PDF
      description: |
        Returns `application/pdf` for a prepaid policy when validations pass (policy number, start date,
        premium > 0, package.productDurationDays set, not postpaid). Same access as customer payments.
        Query params mirror the Payments tab filter for the **table** and **filtered total** (confirmed rows only in PDF).
      tags:
        - Internal Customers
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: policyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: fromDate
          in: query
          required: false
          description: Inclusive lower bound on expected payment date (YYYY-MM-DD), same as payments list
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: false
          description: Inclusive upper bound on expected payment date (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: PDF bytes
          content:
            application/pdf:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              description: attachment; filename="..."
              schema:
                type: string
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (same as payments access)
        '404':
          description: Customer or policy not found / not accessible
        '422':
          description: Validation — missing policy data, postpaid, or no confirmed payments in range
        '500':
          description: Server error

  /internal/customers/{customerId}/payments:
    get:
      operationId: getCustomerPaymentsExtended
      summary: List customer payments (extended)
      description: |
        Existing endpoint; extended with optional filters for UI pagination and status filtering.
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: policyId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: fromDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: paymentStatus
          in: query
          required: false
          description: Repeatable or comma-separated; filter by PolicyPayment.paymentStatus
          schema:
            type: array
            items:
              type: string
              enum:
                - PENDING_STK_CALLBACK
                - COMPLETED_PENDING_RECEIPT
                - COMPLETED
          style: form
          explode: true
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Paginated or full list per implementation default

components: {}
